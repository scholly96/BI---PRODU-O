<body>

<div class="bg"></div>
<img id="slide">

<style>
body {
    margin: 0;
    overflow: hidden;
}

.bg {
    position: absolute;
    width: 100%;
    height: 100vh;
    background-size: cover;
    background-position: center;
    filter: blur(20px);
    transform: scale(1.1);
}

img {
    position: absolute;
    width: 100%;
    height: 100vh;
    object-fit: contain;
}
</style>

<script>
const imagens = ["hydro.jpg","granorte.jpg","brasil.jpg"];

let index = 0;

function trocar() {
    const img = document.getElementById("slide");
    const bg = document.querySelector(".bg");

    const src = imagens[index] + "?t=" + new Date().getTime();

    img.src = src;
    bg.style.backgroundImage = "url('" + src + "')";

    index = (index + 1) % imagens.length;
}

trocar();
setInterval(trocar, 10000);
</script>

</body>
